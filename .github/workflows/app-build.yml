name: app-build-dryrun

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - '.github/workflows/app-build.yml'

jobs:
  build:
    runs-on: arc-runner-set
    steps:
      - uses: actions/checkout@v4

      - name: set up buildx
        uses: docker/setup-buildx-action@v3

      - name: dry-run build with GHA cache
        uses: docker/build-push-action@v6
        with:
          context: ./app
          file: ./app/Dockerfile
          push: false
          load: false
          tags: arc-test-app:dryrun
          cache-from: type=gha,scope=app
          cache-to: type=gha,mode=max,scope=app
