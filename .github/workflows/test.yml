name: arc-test

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  hello:
    runs-on: arc-runner-set
    steps:
      - name: runner info
        run: |
          echo "hostname: $(hostname)"
          echo "kernel: $(uname -a)"
          echo "whoami: $(whoami)"
          echo "pwd: $(pwd)"

      - name: checkout
        uses: actions/checkout@v4

      - name: list repo
        run: ls -la

      - name: env
        run: env | sort
